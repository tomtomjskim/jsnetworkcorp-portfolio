server {
    listen 80;
    listen [::]:80;
    server_name portfolio.jsnetworkcorp.com;

    root /var/www/jsnetworkcorp-portfolio/public;
    index index.html;

    access_log /var/log/nginx/portfolio.jsnetworkcorp.com.access.log;
    error_log /var/log/nginx/portfolio.jsnetworkcorp.com.error.log;

    location /_next/static/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /wireframes/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /interview/ {
        alias /var/www/jsnetworkcorp-portfolio/interview-kit/;
        index index.html;
        auth_basic "JSNetworkCorp interview kit";
        auth_basic_user_file /etc/nginx/.htpasswd-jsnetworkcorp-interview;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
