server {
    listen 80;
    listen [::]:80;
    server_name interview.jsnetworkcorp.com;

    root /var/www/jsnetworkcorp-portfolio/interview-kit;
    index index.html;

    access_log /var/log/nginx/interview.jsnetworkcorp.com.access.log;
    error_log /var/log/nginx/interview.jsnetworkcorp.com.error.log;

    auth_basic "JSNetworkCorp interview kit";
    auth_basic_user_file /etc/nginx/.htpasswd-jsnetworkcorp-interview;

    location / {
        try_files $uri $uri/ =404;
    }
}
